map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── HTTP — Development ───────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    resolver 127.0.0.11 valid=5s ipv6=off;

    client_max_body_size 50M;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;

    # CORS headers only needed on nginx-generated error pages (502/503/504).
    # Regular proxied responses get CORS headers from Django's corsheaders middleware.
    error_page 502 503 504 = @backend_error;
    location @backend_error {
        add_header 'Access-Control-Allow-Origin'  $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'   always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
        return 502;
    }

    # ── Django Admin — auth-service (users/auth management) ──────────────────
    location /sms-admin/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Django Admin — org-service (organizations/plans management) ───────────
    location /org-admin/ {
        set $svc "org-service:8002";
        proxy_pass http://$svc/sms-admin/;
        include /etc/nginx/proxy_params;
    }

    # ── Auth (all auth-service endpoints) ────────────────────────────────────
    location /api/auth/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/plans/ {
        set $svc "org-service:8002";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/profile/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/users/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/permissions/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/current-user/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/first-login-change-password/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/check-password-change-required/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/send-password-change-otp/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/verify-password-change-otp/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/change-password-with-otp/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/send-forgot-password-otp/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/verify-forgot-password-otp/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/reset-password-with-otp/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/student-direct-change-password/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Org ───────────────────────────────────────────────────────────────────
    location /api/organizations/ {
        set $svc "org-service:8002";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Campus ────────────────────────────────────────────────────────────────
    location /api/campus/ {
        set $svc "campus-service:8003";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/classes/ {
        set $svc "campus-service:8003";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/classrooms/ {
        set $svc "campus-service:8003";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/levels/ {
        set $svc "campus-service:8003";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/grades/ {
        set $svc "campus-service:8003";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Staff ─────────────────────────────────────────────────────────────────
    location /api/teachers/ {
        set $svc "staff-service:8004";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/coordinators/ {
        set $svc "staff-service:8004";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/principals/ {
        set $svc "staff-service:8004";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Students ──────────────────────────────────────────────────────────────
    location /api/students/ {
        set $svc "student-service:8005";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/behaviour/ {
        set $svc "student-service:8005";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Attendance + ZKTeco ───────────────────────────────────────────────────
    location /api/attendance/ {
        set $svc "attendance-service:8006";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /iclock/ {
        set $svc "attendance-service:8006";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Result ────────────────────────────────────────────────────────────────
    location /api/result/ {
        set $svc "result-service:8007";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/results/ {
        set $svc "result-service:8007";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Fees ──────────────────────────────────────────────────────────────────
    location /api/fees/ {
        set $svc "fees-service:8008";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Timetable + Transfers ─────────────────────────────────────────────────
    location /api/timetable/ {
        set $svc "timetable-service:8009";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/transfers/ {
        set $svc "timetable-service:8009";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Notifications ─────────────────────────────────────────────────────────
    location /api/notifications/ {
        set $svc "notification-service:8010";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        set $svc "notification-service:8010";
        proxy_pass         http://$svc;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # ── Support ───────────────────────────────────────────────────────────────
    location /api/requests/ {
        set $svc "support-service:8011";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }
    location /api/form-builder/ {
        set $svc "support-service:8011";
        proxy_pass http://$svc;
        include /etc/nginx/proxy_params;
    }

    # ── Health checks ─────────────────────────────────────────────────────────
    location /health/auth/ {
        set $svc "auth-service:8001";
        proxy_pass http://$svc/health/;
    }
    location /health/attendance/ {
        set $svc "attendance-service:8006";
        proxy_pass http://$svc/health/;
    }
    location /health/student/ {
        set $svc "student-service:8005";
        proxy_pass http://$svc/health/;
    }

    # ── Frontend catch-all ────────────────────────────────────────────────────
    location / {
        set $svc "frontend:3000";
        proxy_pass         http://$svc;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
