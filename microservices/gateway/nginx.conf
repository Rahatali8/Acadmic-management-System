upstream auth_service      { server auth-service:8001; }
upstream org_service       { server org-service:8002; }
upstream campus_service    { server campus-service:8003; }
upstream staff_service     { server staff-service:8004; }
upstream student_service   { server student-service:8005; }
upstream attendance_service { server attendance-service:8006; }
upstream result_service    { server result-service:8007; }
upstream fees_service      { server fees-service:8008; }
upstream timetable_service { server timetable-service:8009; }
upstream notification_service { server notification-service:8010; }
upstream support_service   { server support-service:8011; }
upstream frontend          { server frontend:3000; }

# Logging
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Auth Service ──────────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://auth_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/plans/ {
        proxy_pass http://auth_service/api/plans/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Org Service ───────────────────────────────────────────────────────────
    location /api/org/ {
        proxy_pass http://org_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Campus Service ────────────────────────────────────────────────────────
    location /api/campus/ {
        proxy_pass http://campus_service/api/campus/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/classes/ {
        proxy_pass http://campus_service/api/classes/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/levels/ {
        proxy_pass http://campus_service/api/levels/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/grades/ {
        proxy_pass http://campus_service/api/grades/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Staff Service ─────────────────────────────────────────────────────────
    location /api/teachers/ {
        proxy_pass http://staff_service/api/teachers/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/coordinators/ {
        proxy_pass http://staff_service/api/coordinators/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/principals/ {
        proxy_pass http://staff_service/api/principals/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Student Service ───────────────────────────────────────────────────────
    location /api/students/ {
        proxy_pass http://student_service/api/students/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/behaviour/ {
        proxy_pass http://student_service/api/behaviour/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Attendance Service ────────────────────────────────────────────────────
    location /api/attendance/ {
        proxy_pass http://attendance_service/api/attendance/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ZKTeco device pushes — routed directly to attendance-service
    location /iclock/ {
        proxy_pass http://attendance_service/iclock/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Result Service ────────────────────────────────────────────────────────
    location /api/result/ {
        proxy_pass http://result_service/api/result/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/results/ {
        proxy_pass http://result_service/api/results/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Fees Service ──────────────────────────────────────────────────────────
    location /api/fees/ {
        proxy_pass http://fees_service/api/fees/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Timetable Service ─────────────────────────────────────────────────────
    location /api/timetable/ {
        proxy_pass http://timetable_service/api/timetable/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/transfers/ {
        proxy_pass http://timetable_service/api/transfers/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Notification Service (HTTP + WebSocket) ───────────────────────────────
    location /api/notifications/ {
        proxy_pass http://notification_service/api/notifications/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /ws/ {
        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ── Support Service ───────────────────────────────────────────────────────
    location /api/requests/ {
        proxy_pass http://support_service/api/requests/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/form-builder/ {
        proxy_pass http://support_service/api/form-builder/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Service Health Endpoints ──────────────────────────────────────────────
    location /health/auth/         { proxy_pass http://auth_service/health/; }
    location /health/org/          { proxy_pass http://org_service/health/; }
    location /health/campus/       { proxy_pass http://campus_service/health/; }
    location /health/staff/        { proxy_pass http://staff_service/health/; }
    location /health/student/      { proxy_pass http://student_service/health/; }
    location /health/attendance/   { proxy_pass http://attendance_service/health/; }
    location /health/result/       { proxy_pass http://result_service/health/; }
    location /health/fees/         { proxy_pass http://fees_service/health/; }
    location /health/timetable/    { proxy_pass http://timetable_service/health/; }
    location /health/notification/ { proxy_pass http://notification_service/health/; }
    location /health/support/      { proxy_pass http://support_service/health/; }

    # ── Frontend (catch-all) ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
