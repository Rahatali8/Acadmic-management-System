apiVersion: apps/v1
kind: Deployment
metadata:
  name: fees-service
  namespace: ams-production
  labels:
    app: fees-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fees-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fees-service
    spec:
      containers:
        - name: fees-service
          image: registry.example.com/ams/fees-serviceatest
          imagePullPolicy: Always
          ports:
            - containerPort: 8008
          envFrom:
            - configMapRef:
                name: fees-service-config
            - secretRef:
                name: fees-service-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health/
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 10
