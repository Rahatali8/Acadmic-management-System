apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
  namespace: ams-production
  labels:
    app: result-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: result-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: result-service
    spec:
      containers:
        - name: result-service
          image: registry.example.com/ams/result-serviceatest
          imagePullPolicy: Always
          ports:
            - containerPort: 8007
          envFrom:
            - configMapRef:
                name: result-service-config
            - secretRef:
                name: result-service-secret
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health/
              port: 8007
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: 8007
            initialDelaySeconds: 15
            periodSeconds: 10
